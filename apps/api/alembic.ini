[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# URL is overridden at runtime by DATABASE_URL from apps/api/.env (see env.py).
# This fallback is only used if DATABASE_URL is not set.
sqlalchemy.url = postgresql+asyncpg://aiscreener:aiscreener@localhost:5432/aiscreener

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
